name: Hotfix Release
version: '1.0.0'
on:
  manual: true

inputs:
  scope:
    type: string
    default: platform
    description: Package scope to hotfix

jobs:
  hotfix:
    runsOn: local
    steps:
      - name: Plan
        id: plan
        run: pnpm kb release plan --scope ${{ inputs.scope }} --bump patch --json

      - name: Approve hotfix
        id: approve
        uses: builtin:approval
        with:
          title: 'Approve hotfix ${{ steps.plan.outputs.version }}'
          instructions: |
            Quick patch release without full checks.
            Scope: ${{ inputs.scope }}
            Packages: ${{ steps.plan.outputs.packages }}

      - name: Bump versions
        if: ${{ steps.approve.outputs.approved }}
        run: pnpm kb release version --scope ${{ inputs.scope }} --bump patch --json

      - name: Publish
        if: ${{ steps.approve.outputs.approved }}
        run: pnpm kb release publish --scope ${{ inputs.scope }} --json

      - name: Git commit & tag
        if: ${{ steps.approve.outputs.approved }}
        run: pnpm kb release git --scope ${{ inputs.scope }} --bump patch --json
