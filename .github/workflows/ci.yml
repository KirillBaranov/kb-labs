name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.vscode/**'
      - '.idea/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ── 1. Build Go tools (host Linux binary) ────────────────────────────────────
  # Single host build — used by every downstream job via artifact restore.
  # All quality checks (lint/test/e2e) are driven through kb-devkit so the
  # same task graph and cache semantics apply everywhere.
  build-tools:
    name: Build Go tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git diff origin/main...HEAD` works
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-devkit/go.mod
          cache-dependency-path: |
            tools/kb-devkit/go.sum
            tools/kb-dev/go.sum
            tools/kb-create/go.sum
            tools/kb-deploy/go.sum
            tools/kb-monitor/go.sum
      - name: Build kb-devkit (host)
        run: make build
        working-directory: tools/kb-devkit
      - name: Build all Go binaries via devkit
        run: ./tools/kb-devkit/kb-devkit run build --packages github.com/kb-labs/devkit,github.com/kb-labs/dev,kb-create,github.com/kb-labs/kb-deploy,github.com/kb-labs/kb-monitor
      - name: Collect binaries
        run: |
          mkdir -p go-tools
          cp tools/kb-devkit/kb-devkit go-tools/kb-devkit
          cp tools/kb-dev/kb-dev       go-tools/kb-dev
          cp tools/kb-create/kb-create go-tools/kb-create
          cp tools/kb-deploy/kb-deploy go-tools/kb-deploy
          cp tools/kb-monitor/kb-monitor go-tools/kb-monitor
      - uses: actions/upload-artifact@v4
        with:
          name: go-tools
          path: go-tools/
          retention-days: 1

  # ── 2. Build all TS packages via devkit (topological order) ──────────────────
  build:
    name: Build TS (devkit)
    runs-on: ubuntu-latest
    needs: build-tools
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install Go tools
        run: |
          chmod +x tools-bin/*
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
          cp tools-bin/kb-dev    tools/kb-dev/kb-dev
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (devkit, topological, no cache)
        run: ./tools/kb-devkit/kb-devkit run build --no-cache
      - name: Pack dist artifacts
        run: find . -path "*/dist" -not -path "*/node_modules/*" -type d | tar cf dist-artifacts.tar -T -
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist-artifacts.tar
          retention-days: 1
          compression-level: 3

  # ── 2b. Dependency hygiene (Single Version Policy) ─────────────────────────
  deps:
    name: Deps (syncpack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check Single Version Policy (versions + format)
        run: pnpm deps:lint

  # ── 3. Lint / Type-check / Test — all packages ──────────────────────────────
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        task: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-devkit/go.mod
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install Go tools
        run: |
          chmod +x tools-bin/*
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
          cp tools-bin/kb-dev    tools/kb-dev/kb-dev
      - uses: actions/download-artifact@v4
        with:
          name: dist
      - run: tar xf dist-artifacts.tar
      - run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.task }}
        run: ./tools/kb-devkit/kb-devkit run ${{ matrix.task }}

  # ── 4. kb-create e2e smoke — always on main ─────────────────────────────────
  # Full network-bound integration suite (real pnpm install from npm,
  # kb-dev download, config scaffolding). Always runs on main to catch
  # regressions from transitive npm deps not visible in PR diffs.
  launcher-e2e:
    name: kb-create e2e
    runs-on: ubuntu-latest
    needs: build-tools
    timeout-minutes: 20
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-create/go.mod
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install devkit
        run: |
          chmod +x tools-bin/kb-devkit
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
      - name: Run kb-create e2e via devkit
        run: ./tools/kb-devkit/kb-devkit run e2e --packages kb-create --no-cache
