name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.vscode/**'
      - '.idea/**'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Shared env: tell kb-devkit which base ref to diff against.
# - PR events: diff vs the PR base (e.g. origin/main...HEAD)
# - Push events on main: diff vs the previous commit
# The .devkit/affected.sh helper reads KB_DEVKIT_BASE_REF.
env:
  KB_DEVKIT_BASE_REF: >-
    ${{ github.event_name == 'pull_request'
        && format('origin/{0}...HEAD', github.event.pull_request.base.ref)
        || 'HEAD~1' }}

jobs:
  # ── 1. Build Go tools (host Linux binary) ────────────────────────────────────
  # Single host build — used by every downstream job via artifact restore.
  # All quality checks (lint/test/e2e) are driven through kb-devkit so the
  # same task graph and cache semantics apply everywhere.
  build-tools:
    name: Build Go tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git diff origin/main...HEAD` works
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-devkit/go.mod
          cache-dependency-path: |
            tools/kb-devkit/go.sum
            tools/kb-dev/go.sum
            tools/kb-create/go.sum
            tools/kb-deploy/go.sum
            tools/kb-monitor/go.sum
      - name: Build kb-devkit (host)
        run: make build
        working-directory: tools/kb-devkit
      - name: Build all Go binaries via devkit
        run: ./tools/kb-devkit/kb-devkit run build --packages github.com/kb-labs/devkit,github.com/kb-labs/dev,kb-create,github.com/kb-labs/kb-deploy,github.com/kb-labs/kb-monitor
      - name: Collect binaries
        run: |
          mkdir -p go-tools
          cp tools/kb-devkit/kb-devkit go-tools/kb-devkit
          cp tools/kb-dev/kb-dev       go-tools/kb-dev
          cp tools/kb-create/kb-create go-tools/kb-create
          cp tools/kb-deploy/kb-deploy go-tools/kb-deploy
          cp tools/kb-monitor/kb-monitor go-tools/kb-monitor
      - uses: actions/upload-artifact@v4
        with:
          name: go-tools
          path: go-tools/
          retention-days: 1

  # ── 2. Build all TS packages via devkit (topological order) ──────────────────
  build:
    name: Build TS (devkit)
    runs-on: ubuntu-latest
    needs: build-tools
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install Go tools
        run: |
          chmod +x tools-bin/*
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
          cp tools-bin/kb-dev    tools/kb-dev/kb-dev
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (devkit, topological)
        run: ./tools/kb-devkit/kb-devkit run build
      - name: Pack dist artifacts
        run: find . -path "*/dist" -not -path "*/node_modules/*" -type d | tar cf dist-artifacts.tar -T -
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist-artifacts.tar
          retention-days: 1
          compression-level: 3

  # ── 3. Lint / Type-check / Test — affected packages only ────────────────────
  # All three reuse the same setup. Each runs `kb-devkit run <task> --affected`
  # so only packages touched by this PR/push get checked (plus downstream
  # dependents). Results are cached by content hash via devkit.
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        task: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-devkit/go.mod
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install Go tools
        run: |
          chmod +x tools-bin/*
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
          cp tools-bin/kb-dev    tools/kb-dev/kb-dev
      - uses: actions/download-artifact@v4
        with:
          name: dist
      - run: tar xf dist-artifacts.tar
      - run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.task }} on affected packages
        run: ./tools/kb-devkit/kb-devkit run ${{ matrix.task }} --affected

  # ── 4. kb-create e2e smoke — runs when launcher touched OR on main ──────────
  # This is THE critical gate before releases. Full network-bound integration
  # suite (real pnpm install from npm, kb-dev download, config scaffolding).
  # Runs ~8 minutes so we don't burn CI minutes on unrelated PRs:
  #   - pull_request: only if kb-create sources changed (devkit --affected)
  #   - push to main: unconditionally (catches regressions from transitive
  #     npm deps that weren't visible in the PR diff)
  launcher-e2e:
    name: kb-create e2e
    runs-on: ubuntu-latest
    needs: build-tools
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-create/go.mod
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install devkit
        run: |
          chmod +x tools-bin/kb-devkit
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit

      # Skip e2e on PRs that don't touch kb-create — saves ~8 min per run.
      # On push to main we always run (ignore affected) because transitive
      # npm publishes can break the launcher without any repo change.
      #
      # Decision inputs come from .devkit/affected.sh directly (same script
      # kb-devkit uses for --affected), keyed on the path prefix. This keeps
      # the gate independent of devkit JSON output format.
      - name: Should run e2e?
        id: gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "run=true"  >> "$GITHUB_OUTPUT"
            echo "reason=push-to-main" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(.devkit/affected.sh || true)
          if echo "$changed" | grep -qE '^tools/kb-create/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "reason=kb-create-touched" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=unchanged" >> "$GITHUB_OUTPUT"
          fi

      - name: Run kb-create e2e via devkit
        if: steps.gate.outputs.run == 'true'
        run: ./tools/kb-devkit/kb-devkit run e2e --packages kb-create --no-cache

      - name: Skipped
        if: steps.gate.outputs.run != 'true'
        run: echo "kb-create e2e skipped (${{ steps.gate.outputs.reason }})"
