name: CI (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Diff base: PR base branch (e.g. origin/main...HEAD)
env:
  KB_DEVKIT_BASE_REF: >-
    ${{ format('origin/{0}...HEAD', github.event.pull_request.base.ref) }}

jobs:
  # ── 1. Build Go tools ──────────────────────────────────────────────────────
  build-tools:
    name: Build Go tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-devkit/go.mod
          cache-dependency-path: |
            tools/kb-devkit/go.sum
            tools/kb-dev/go.sum
            tools/kb-create/go.sum
            tools/kb-deploy/go.sum
            tools/kb-monitor/go.sum
      - name: Build kb-devkit (host)
        run: make build
        working-directory: tools/kb-devkit
      - name: Build all Go binaries via devkit
        run: ./tools/kb-devkit/kb-devkit run build --packages github.com/kb-labs/devkit,github.com/kb-labs/dev,kb-create,github.com/kb-labs/kb-deploy,github.com/kb-labs/kb-monitor
      - name: Collect binaries
        run: |
          mkdir -p go-tools
          cp tools/kb-devkit/kb-devkit go-tools/kb-devkit
          cp tools/kb-dev/kb-dev       go-tools/kb-dev
          cp tools/kb-create/kb-create go-tools/kb-create
          cp tools/kb-deploy/kb-deploy go-tools/kb-deploy
          cp tools/kb-monitor/kb-monitor go-tools/kb-monitor
      - uses: actions/upload-artifact@v4
        with:
          name: go-tools
          path: go-tools/
          retention-days: 1

  # ── 2. Build affected TS packages ──────────────────────────────────────────
  build:
    name: Build TS (affected)
    runs-on: ubuntu-latest
    needs: build-tools
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install Go tools
        run: |
          chmod +x tools-bin/*
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
          cp tools-bin/kb-dev    tools/kb-dev/kb-dev
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (devkit, topological)
        run: ./tools/kb-devkit/kb-devkit run build
      - name: Pack dist artifacts
        run: find . -path "*/dist" -not -path "*/node_modules/*" -type d | tar cf dist-artifacts.tar -T -
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist-artifacts.tar
          retention-days: 1
          compression-level: 3

  # ── 2b. Dependency hygiene (Single Version Policy) ─────────────────────────
  deps:
    name: Deps (syncpack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check Single Version Policy (versions + format)
        run: pnpm deps:lint

  # ── 3. Lint / Type-check / Test — affected packages only ───────────────────
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        task: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-devkit/go.mod
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install Go tools
        run: |
          chmod +x tools-bin/*
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
          cp tools-bin/kb-dev    tools/kb-dev/kb-dev
      - uses: actions/download-artifact@v4
        with:
          name: dist
      - run: tar xf dist-artifacts.tar
      - run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.task }} on affected packages
        run: ./tools/kb-devkit/kb-devkit run ${{ matrix.task }} --affected

  # ── 4. kb-create e2e — only if launcher sources changed ────────────────────
  launcher-e2e:
    name: kb-create e2e
    runs-on: ubuntu-latest
    needs: build-tools
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-create/go.mod
      - uses: actions/download-artifact@v4
        with:
          name: go-tools
          path: tools-bin/
      - name: Install devkit
        run: |
          chmod +x tools-bin/kb-devkit
          cp tools-bin/kb-devkit tools/kb-devkit/kb-devkit
      - name: Should run e2e?
        id: gate
        run: |
          set -euo pipefail
          changed=$(.devkit/affected.sh || true)
          if echo "$changed" | grep -qE '^tools/kb-create/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run kb-create e2e via devkit
        if: steps.gate.outputs.run == 'true'
        run: ./tools/kb-devkit/kb-devkit run e2e --packages kb-create --no-cache
      - name: Skipped
        if: steps.gate.outputs.run != 'true'
        run: echo "kb-create e2e skipped (no kb-create changes in this PR)"
