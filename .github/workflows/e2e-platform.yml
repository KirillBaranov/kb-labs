name: E2E Platform Tests

# Full platform scenario tests: build from source → publish to Verdaccio →
# kb-create installs (full user flow simulation) → start all services →
# run per-domain Playwright API tests via `kb-devkit run e2e`.
#
# Tests run on the CI runner (not inside Docker) against platform services
# exposed on host ports. Each domain is a separate workspace package:
#   @kb-labs/e2e-services, e2e-platform, e2e-gateway, e2e-marketplace,
#   e2e-workflows, e2e-studio, e2e-plugins
#
# Run a single domain:
#   kb-devkit run e2e --packages @kb-labs/e2e-workflows
# Run affected only:
#   kb-devkit run e2e --affected
#
# Triggers:
# - Every push to main (pre-release validation)
# - After every binary release
# - Weekly Monday 9am UTC
# - Manual dispatch

on:
  workflow_run:
    workflows: ["Release Binaries"]
    types: [completed]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  e2e:
    name: Platform E2E
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build toolchain ──────────────────────────────────────────────────

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-create/go.mod
          cache-dependency-path: |
            tools/kb-create/go.sum
            tools/kb-dev/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── Compile Go tools for linux/amd64 ────────────────────────────────
      # The committed binaries in tools/ are macOS builds.

      - name: Build Go tools for linux (kb-devkit, kb-dev)
        run: |
          (cd tools/kb-devkit && CGO_ENABLED=0 go build -o kb-devkit .)
          (cd tools/kb-dev    && CGO_ENABLED=0 go build -o kb-dev .)

      # ── Install + build monorepo ─────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (topological order)
        run: pnpm build

      # ── Install Playwright browsers ──────────────────────────────────────

      - name: Install Playwright browsers
        run: cd e2e/plugins && pnpm exec playwright install chromium --with-deps

      # ── Pack packages for Verdaccio ──────────────────────────────────────

      - name: Pack @kb-labs/* packages
        run: bash e2e/scripts/pack-all.sh

      - name: List packed packages
        run: ls -lh e2e/packages/*.tgz | wc -l && echo "tarballs packed"

      # ── Docker layer caching ─────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers (platform)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-platform
          key: buildx-platform-${{ hashFiles('e2e/platform/Dockerfile', 'e2e/platform/entrypoint.sh', 'e2e/platform/registry-manifest.json', 'tools/kb-create/**', 'tools/kb-dev/**') }}
          restore-keys: buildx-platform-

      - name: Cache Docker layers (publisher)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-publisher
          key: buildx-publisher-${{ hashFiles('e2e/publisher/**', 'e2e/packages/**') }}
          restore-keys: buildx-publisher-

      # ── Build Docker images ──────────────────────────────────────────────

      - name: Build platform image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache-platform \
            --cache-to   type=local,dest=/tmp/.buildx-cache-platform,mode=max \
            --load \
            -t kb-e2e-ci-platform:latest \
            -f e2e/platform/Dockerfile .

      - name: Build publisher image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache-publisher \
            --cache-to   type=local,dest=/tmp/.buildx-cache-publisher,mode=max \
            --load \
            -t kb-e2e-ci-publisher:latest \
            -f e2e/publisher/Dockerfile \
            e2e/

      # ── Start infrastructure ─────────────────────────────────────────────

      - name: Start Verdaccio registry
        run: docker compose -f e2e/docker-compose.yml up -d verdaccio
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Wait for Verdaccio to be healthy
        run: |
          echo "Waiting for Verdaccio..."
          for i in $(seq 1 30); do
            if docker compose -f e2e/docker-compose.yml ps verdaccio | grep -q "healthy"; then
              echo "Verdaccio is healthy after $((i * 2))s"
              break
            fi
            sleep 2
          done
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Publish packages to Verdaccio
        run: docker compose -f e2e/docker-compose.yml run --rm publisher
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Start platform
        run: docker compose -f e2e/docker-compose.yml up -d --no-build platform
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Wait for platform to be healthy
        run: |
          echo "Waiting for platform (up to 5 min)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/ready > /dev/null 2>&1; then
              echo "Platform ready after $((i * 5))s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Platform failed to start — dumping logs"
              docker compose -f e2e/docker-compose.yml logs platform | tail -100
              exit 1
            fi
            sleep 5
          done
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      # ── Run E2E suite ────────────────────────────────────────────────────
      # kb-devkit runs each domain in parallel (concurrency: NumCPU-1).
      # Domains: services, platform, gateway, marketplace, workflows, studio, plugins

      - name: Run e2e tests
        run: ./tools/kb-devkit/kb-devkit run e2e
        env:
          GATEWAY_URL:     http://localhost:4000
          REST_URL:        http://localhost:5050
          MARKETPLACE_URL: http://localhost:5070
          WORKFLOW_URL:    http://localhost:7778
          STATE_URL:       http://localhost:7777
          CI: "true"

      # ── Artifacts + summary ──────────────────────────────────────────────

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            e2e/services/report/
            e2e/platform/report/
            e2e/gateway/report/
            e2e/marketplace/report/
            e2e/workflows/report/
            e2e/studio/report/
            e2e/plugins/report/
          retention-days: 14

      - name: Show checklist summary
        if: always()
        run: |
          for domain in services platform gateway marketplace workflows studio plugins; do
            checklist="e2e/$domain/report/CHECKLIST.md"
            if [ -f "$checklist" ]; then
              echo "### E2E: $domain" >> $GITHUB_STEP_SUMMARY
              cat "$checklist" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Cleanup
        if: always()
        run: docker compose -f e2e/docker-compose.yml down --volumes --remove-orphans
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci
