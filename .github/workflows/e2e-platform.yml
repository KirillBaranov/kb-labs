name: E2E Platform Tests

# Full platform scenario tests: build from source → publish to Verdaccio →
# kb-create installs (full user flow simulation) → start all services →
# run Playwright API tests (services ready, plugins loaded, gateway auth,
# marketplace, workflows, Studio MF proxy, SSE/WS).
#
# Triggers:
# - Every push to main (pre-release validation)
# - After every binary release
# - Weekly Monday 9am UTC
# - Manual dispatch

on:
  workflow_run:
    workflows: ["Release Binaries"]
    types: [completed]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  e2e:
    name: Platform E2E (Docker Compose)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build toolchain ──────────────────────────────────────────────────

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-create/go.mod
          cache-dependency-path: |
            tools/kb-create/go.sum
            tools/kb-dev/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # version is read from package.json#packageManager (pnpm@9.11.0)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── Compile Go tools for linux/amd64 ────────────────────────────────────
      # The committed binaries in tools/ are macOS builds.
      # Rebuild for the CI runner before any pnpm script that invokes them.

      - name: Build Go tools for linux (kb-devkit, kb-dev)
        run: |
          (cd tools/kb-devkit && CGO_ENABLED=0 go build -o kb-devkit .)
          (cd tools/kb-dev    && CGO_ENABLED=0 go build -o kb-dev .)

      # ── Install + build monorepo ─────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (topological order)
        run: pnpm build
        # kb-devkit run build — respects DTS dependency chains

      # ── Pack packages for Verdaccio ──────────────────────────────────────

      - name: Pack @kb-labs/* packages
        run: bash e2e/scripts/pack-all.sh
        # Outputs to e2e/packages/*.tgz — baked into publisher Docker image

      - name: List packed packages
        run: ls -lh e2e/packages/*.tgz | wc -l && echo "tarballs packed"

      # ── Docker layer caching ─────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers (platform)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-platform
          key: buildx-platform-${{ hashFiles('e2e/platform/**', 'tools/kb-create/**', 'tools/kb-dev/**') }}
          restore-keys: buildx-platform-

      - name: Cache Docker layers (publisher)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-publisher
          key: buildx-publisher-${{ hashFiles('e2e/publisher/**', 'e2e/packages/**') }}
          restore-keys: buildx-publisher-

      - name: Cache Docker layers (tests)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-tests
          key: buildx-tests-${{ hashFiles('e2e/tests/package.json') }}
          restore-keys: buildx-tests-

      # ── Build Docker images ──────────────────────────────────────────────

      - name: Build platform image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache-platform \
            --cache-to   type=local,dest=/tmp/.buildx-cache-platform,mode=max \
            --load \
            -t kb-e2e-ci-platform:latest \
            -f e2e/platform/Dockerfile .

      - name: Build publisher image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache-publisher \
            --cache-to   type=local,dest=/tmp/.buildx-cache-publisher,mode=max \
            --load \
            -t kb-e2e-ci-publisher:latest \
            -f e2e/publisher/Dockerfile \
            e2e/

      - name: Build tests image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache-tests \
            --cache-to   type=local,dest=/tmp/.buildx-cache-tests,mode=max \
            --load \
            -t kb-e2e-ci-tests:latest \
            e2e/tests

      # ── Run E2E suite ────────────────────────────────────────────────────

      - name: Create report directory
        run: mkdir -p e2e/tests/report

      # Publisher is a one-shot container that must exit 0 before platform starts.
      # Running it with `docker-compose run --rm` instead of including it in the
      # main `up` avoids --abort-on-container-exit killing the platform when the
      # publisher exits cleanly.
      - name: Start Verdaccio registry
        run: docker compose -f e2e/docker-compose.yml up -d verdaccio
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Wait for Verdaccio to be healthy
        run: |
          echo "Waiting for Verdaccio..."
          for i in $(seq 1 30); do
            if docker compose -f e2e/docker-compose.yml ps verdaccio | grep -q "healthy"; then
              echo "Verdaccio is healthy after ${i}s"
              break
            fi
            sleep 2
          done
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Publish packages to Verdaccio
        run: docker compose -f e2e/docker-compose.yml run --rm publisher
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Run platform and tests
        run: |
          docker compose -f e2e/docker-compose.yml up \
            --abort-on-container-exit \
            --exit-code-from tests \
            --no-build \
            verdaccio platform tests
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      # ── Artifacts + summary ──────────────────────────────────────────────

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: e2e/tests/report/
          retention-days: 14

      - name: Show checklist summary
        if: always()
        run: |
          if [ -f e2e/tests/report/CHECKLIST.md ]; then
            echo "### E2E Checklist" >> $GITHUB_STEP_SUMMARY
            cat e2e/tests/report/CHECKLIST.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f e2e/docker-compose.yml down --volumes --remove-orphans
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci
