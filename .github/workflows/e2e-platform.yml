name: E2E Platform Tests

# Full platform scenario tests: install from kblabs.ru → start all services →
# run Playwright API tests (services ready, plugins loaded, gateway auth,
# marketplace, workflows, Studio MF proxy, SSE/WS).
#
# Triggers:
# - After every binary release (canary on real published artifacts)
# - After e2e/ spec changes land on main
# - Weekly Monday 9am UTC
# - Manual dispatch

on:
  workflow_run:
    workflows: ["Release Binaries"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - 'e2e/**'
      - '.github/workflows/e2e-platform.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  e2e:
    name: Platform E2E (Docker Compose)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: e2e/platform/Dockerfile
          push: false
          load: true
          tags: kb-e2e-platform:ci
          cache-from: type=gha,scope=e2e-platform
          cache-to: type=gha,mode=max,scope=e2e-platform

      - name: Build tests image
        uses: docker/build-push-action@v6
        with:
          context: e2e/tests
          push: false
          load: true
          tags: kb-e2e-tests:ci
          cache-from: type=gha,scope=e2e-tests
          cache-to: type=gha,mode=max,scope=e2e-tests

      - name: Create report directory
        run: mkdir -p e2e/tests/report

      - name: Run E2E suite
        run: |
          docker compose -f e2e/docker-compose.yml up \
            --abort-on-container-exit \
            --exit-code-from tests \
            --no-build
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: e2e/tests/report/
          retention-days: 14

      - name: Show checklist summary
        if: always()
        run: |
          if [ -f e2e/tests/report/CHECKLIST.md ]; then
            echo "### E2E Checklist" >> $GITHUB_STEP_SUMMARY
            cat e2e/tests/report/CHECKLIST.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f e2e/docker-compose.yml down --volumes --remove-orphans
        env:
          COMPOSE_PROJECT_NAME: kb-e2e-ci
