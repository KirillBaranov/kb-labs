name: Deploy Sites

on:
  push:
    branches: [main]
    paths:
      - 'sites/web/**'
      - '.kb/deploy.yaml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to deploy (leave empty for affected)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write  # required for docker push to ghcr.io

concurrency:
  group: deploy-sites
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for git diff HEAD~1 affected detection

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-deploy/go.mod
          cache-dependency-path: tools/kb-deploy/go.sum

      - name: Build kb-deploy
        run: make build
        working-directory: tools/kb-deploy

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -n "${{ inputs.target }}" ]; then
            ./tools/kb-deploy/kb-deploy run ${{ inputs.target }}
          else
            ./tools/kb-deploy/kb-deploy run
          fi

      - name: Show status
        run: ./tools/kb-deploy/kb-deploy status
