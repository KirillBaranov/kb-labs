name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'sites/web/**'
      - 'plugins/gateway/**'
      - 'adapters/openai/**'
      - 'adapters/redis/**'
      - 'adapters/sqlite/**'
      - 'adapters/pino/**'
      - 'adapters/fs/**'
      - 'adapters/log-sqlite/**'
      - 'adapters/log-ringbuffer/**'
      - 'adapters/eventbus-cache/**'
      - 'core/**'
      - 'shared/**'
      - 'tools/kb-deploy/**'
      - '.kb/deploy.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to deploy (leave empty for affected)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write  # required for docker push to ghcr.io

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for multi-commit push diff

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-deploy/go.mod
          cache-dependency-path: tools/kb-deploy/go.sum

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/kb-devkit/go.mod
          cache-dependency-path: tools/kb-devkit/go.sum

      - name: Build kb-devkit
        run: go build -o kb-devkit .
        working-directory: tools/kb-devkit

      - name: Build kb-deploy
        run: make build
        working-directory: tools/kb-deploy

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ./tools/kb-devkit/kb-devkit run build

      - name: Deploy gateway-app (pnpm deploy)
        run: pnpm deploy --filter @kb-labs/gateway-app --prod .kb/deploy/gateway-app

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          KB_DEPLOY_BASE_REF: ${{ github.event.before }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.target }}" ]; then
            ./tools/kb-deploy/kb-deploy run ${{ inputs.target }}
          else
            ./tools/kb-deploy/kb-deploy run
          fi

      - name: Show status
        run: ./tools/kb-deploy/kb-deploy status
