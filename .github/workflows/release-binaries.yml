name: Release Binaries

# Builds and publishes all KB Labs Go binaries (kb-create, kb-dev, kb-devkit,
# kb-deploy, kb-monitor) as a single GitHub Release.
#
# Tag format: v<MAJOR>.<MINOR>.<PATCH>-binaries (e.g. v0.4.0-binaries).
# Valid semver (prerelease suffix) — goreleaser accepts it. The release is
# still marked as non-prerelease (see .goreleaser.yaml) so /releases/latest
# points at it. Suffix distinguishes from npm release tags (pure vX.Y.Z).

on:
  push:
    tags:
      - 'v*-binaries'
  workflow_dispatch:

permissions:
  contents: write   # create release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
