services:
  web:
    image: ghcr.io/kirillbaranov/kb-labs-web:${IMAGE_TAG:-latest}
    container_name: kb-labs-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  docs:
    image: ghcr.io/kirillbaranov/kb-labs-docs:${IMAGE_TAG:-latest}
    container_name: kb-labs-docs
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
