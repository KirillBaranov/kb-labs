name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/kirillbaranov/kb-labs-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push docs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/docs/Dockerfile
          push: true
          tags: ghcr.io/kirillbaranov/kb-labs-docs:latest
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/kirillbaranov/kb-labs-web:latest
            docker pull ghcr.io/kirillbaranov/kb-labs-docs:latest
            docker stop kb-labs-web kb-labs-docs 2>/dev/null || true
            docker rm kb-labs-web kb-labs-docs 2>/dev/null || true
            docker run -d --name kb-labs-web --restart unless-stopped -p 3000:3000 ghcr.io/kirillbaranov/kb-labs-web:latest
            docker run -d --name kb-labs-docs --restart unless-stopped -p 3001:3001 ghcr.io/kirillbaranov/kb-labs-docs:latest
            docker image prune -f
