schemaVersion: 2
extends:
  - builtin:kb-labs

workspace:
  packageManager: pnpm
  maxDepth: 3  # max recursion depth for ** globs; increase if packages are nested deeper
  exclude:
    - plugins/fixtures/*   # test fixtures — not real packages, no build/lint/test tasks
    - templates/*          # scaffold templates — not compiled, only copied to new projects
    - e2e/shared           # shared fixtures package — no runnable tasks, just TS sources
    - e2e/tests            # legacy monolithic e2e bundle — superseded by per-domain packages
  categories:
    # E2E test suites — one package per domain, each runs `playwright test`
    # Depends on workspace:* packages for --affected tracking:
    #   change workflow-engine → e2e-workflows is affected → only its tests run
    e2e-suite:
      match:
        - "e2e/services"
        - "e2e/platform"
        - "e2e/gateway"
        - "e2e/marketplace"
        - "e2e/workflows"
        - "e2e/studio"
        - "e2e/plugins"
      language: typescript
      preset: e2e-suite

    # SPA apps (Rspack / Vite) — pnpm build, not tsup
    # Must come before ts-lib since categories use first-match semantics
    spa:
      match:
        - "studio/app"
        - "plugins/workflow/studio"
      language: typescript
      preset: spa-app

    # Plugin entry packages — tsup (CLI/REST) + rspack (Studio widgets)
    # Must come before ts-lib — plugins/*/entry would otherwise match ts-lib first
    plugin-entry:
      match:
        - "plugins/*/entry"
      language: typescript
      preset: node-lib

    # Backend app entrypoints (daemons, servers)
    # Must come before ts-lib — plugins/*/*  would otherwise match first
    ts-app:
      match:
        - "plugins/*/daemon"
        - "plugins/*/server"
        - "plugins/*/app"
        - "plugins/rest-api/core"
      language: typescript
      preset: node-app

    # TypeScript libraries — full ruleset
    ts-lib:
      match:
        - "core/*"
        - "sdk/*"
        - "cli/*"
        - "shared/*"
        - "plugins/*/*"
        - "adapters/*"
        - "infra/devkit"
        - "studio/*"
        - "templates/*"
      language: typescript
      preset: node-lib

    # Next.js / Nuxt site apps
    site:
      match:
        - "sites/*"
      language: typescript
      preset: site

    go-binary:
      match:
        - "tools/kb-dev"
        - "tools/kb-devkit"
        - "tools/kb-create"
        - "tools/kb-deploy"
        - "tools/kb-monitor"
      language: go
      preset: go-binary

# ──────────────────────────────────────────────────────────────────────────────
# PRESETS
# ──────────────────────────────────────────────────────────────────────────────

presets:
  # Playwright e2e suite — minimal preset, only requires `e2e` script
  e2e-suite:
    language: typescript
    package_json:
      required_scripts:
        - e2e
      required_fields:
        - name
        - version
    dependencies:
      check_links: false
      check_circular: false

  node-lib:
    language: typescript
    package_json:
      required_scripts:
        - build
        - dev
        - test
        - lint
        - type-check
        - clean
      required_dev_deps:
        typescript: "^5"
        tsup: "^8"
        vitest: "^3"
        "@kb-labs/devkit": "*"
      required_fields:
        - name
        - version
        - type
        - engines
        - exports
      type: module
      engines:
        node: ">=20.0.0"
        pnpm: ">=9.0.0"
    tsconfig:
      must_extend_pattern: "@kb-labs/devkit/tsconfig/"
      forbid_paths: true
    tsup:
      must_use_preset: true
      dts_required: true
      tsconfig_must_be_build: false  # not all packages have tsconfig.build.json yet
    eslint:
      must_use_preset: true
    structure:
      required_files:
        - src/index.ts
        - README.md
    dependencies:
      check_links: true
      check_circular: true
      check_version_consistency: true

  node-app:
    language: typescript
    package_json:
      required_scripts:
        - build
        - dev
      required_fields:
        - name
        - version
      required_dev_deps:
        typescript: "^5"
        "@kb-labs/devkit": "*"
    tsconfig:
      must_extend_pattern: "@kb-labs/devkit/tsconfig/"
      forbid_paths: false
    eslint:
      must_use_preset: true
    dependencies:
      check_links: true
      check_circular: true

  # SPA apps (Rspack / Vite) — no tsup, no exports, paths allowed
  spa-app:
    language: typescript
    package_json:
      required_scripts:
        - build
        - dev
      required_fields:
        - name
        - version
    tsconfig:
      forbid_paths: false
    eslint:
      must_use_preset: true
    dependencies:
      check_links: true
      check_circular: true

  # Next.js/Nuxt apps and their utility packages.
  # Only 'build' is universally required — apps have 'dev', utility packages don't.
  site:
    language: typescript
    package_json:
      required_scripts:
        - build
      required_fields:
        - name
        - version
    dependencies:
      check_links: false
      check_circular: false

  go-binary:
    language: go
    structure:
      required_files:
        - go.mod
        - Makefile
    go:
      min_version: "1.22"

# ──────────────────────────────────────────────────────────────────────────────
# STRUCTURE CHECKS — plugin/core package conventions
# ──────────────────────────────────────────────────────────────────────────────

structure_checks:
  # Every plugin group MUST have entry/, contracts/, core/
  plugin:
    scope: "plugins/*"
    required_packages:
      - name: entry
        description: "Plugin entry point — manifest, registerPlugin(), CLI commands, Studio pages"
        required_files:
          - src/index.ts
        must_depend_on:
          - "@kb-labs/sdk"
      - name: contracts
        description: "Type definitions — zero runtime dependencies"
        required_files:
          - src/index.ts
        rules:
          - no_runtime_deps   # only devDependencies + types allowed
      - name: core
        description: "Business logic"
        required_files:
          - src/index.ts
    optional_packages:
      - name: daemon
        description: "HTTP service (long-running process with port)"
        required_files:
          - src/bootstrap.ts
        must_depend_on:
          - "@kb-labs/gateway-contracts"
    dependency_rules:
      # contracts has zero internal deps
      - from: contracts
        to: []
      # core depends on contracts only (within the plugin)
      - from: core
        to: [contracts]
      # entry wires everything together
      - from: entry
        to: [contracts, core]
      # daemon depends on core + contracts
      - from: daemon
        to: [contracts, core]
      # nothing depends on entry (it's the leaf)
      - from: "*"
        not_to: [entry]

  # Core packages MUST have contracts/ (types/) as foundation
  core:
    scope: "core"
    required_packages:
      - name: types
        description: "Base type definitions for entire platform"
        rules:
          - no_runtime_deps
      - name: contracts
        description: "Platform contracts"
        rules:
          - no_runtime_deps

# ──────────────────────────────────────────────────────────────────────────────
# SCAFFOLDING — kb-devkit generate <template> --dest <path> --name <pkg-name>
# Sources: local | npm | git | url
# ──────────────────────────────────────────────────────────────────────────────

scaffolding:
  templates:
    node-lib:
      source: local
      path: templates/node-lib

    go-binary:
      source: local
      path: templates/go-binary

    # plugin:
    #   source: local
    #   path: infra/devkit/templates/plugin
    #
    # adapter:
    #   source: npm
    #   package: "@kb-labs/template-adapter"
    #
    # starter:
    #   source: git
    #   url: "https://github.com/org/repo"
    #   ref: "main"

# ──────────────────────────────────────────────────────────────────────────────
# SYNC — devkit assets
# ──────────────────────────────────────────────────────────────────────────────

sync:
  sources:
    devkit:
      type: local
      path: infra/devkit

  targets:
    - source: devkit
      from: agents/
      to: .kb/devkit/agents/
    - source: devkit
      from: assets/claude/skills/
      to: skills/

  exclude:
    - skills/my-custom-skill.ts
    - .vscode/launch.json

# ──────────────────────────────────────────────────────────────────────────────
# AFFECTED — how `kb-devkit run --affected` detects changed packages
# ──────────────────────────────────────────────────────────────────────────────

affected:
  # strategy: git (default) | submodules | command
  #   git        — single `git diff --name-only HEAD` from workspace root
  #                (uncommitted changes only — CI checkouts have clean tree!)
  #   submodules — walks .gitmodules, runs git diff inside each submodule
  #   command    — runs `command`, reads one file path per line from stdout
  #
  # We use `command` + .devkit/affected.sh so CI can override the base ref via
  # KB_DEVKIT_BASE_REF env var (e.g. origin/main...HEAD for PRs). Locally it
  # falls through to the same behaviour as the built-in git strategy.
  strategy: command
  command: .devkit/affected.sh

# ──────────────────────────────────────────────────────────────────────────────
# BUILD
# ──────────────────────────────────────────────────────────────────────────────

run:
  concurrency: 8

# ──────────────────────────────────────────────────────────────────────────────
# TASKS — execution engine (kb-devkit run <task>)
# content-addressable cache: hash(inputs) → skip if unchanged
# ──────────────────────────────────────────────────────────────────────────────

tasks:
  build:
    - categories: [plugin-entry]
      command: pnpm build
      inputs:
        - "src/**"
        - "tsup.config.ts"
        - "tsup.config.js"
        - "tsconfig*.json"
        - "rspack.studio.config.*"
        - "package.json"
      outputs:
        - "dist/**"
      deps:
        - "^build"

    - categories: [ts-lib, ts-app]
      command: tsup
      inputs:
        - "src/**"
        - "tsup.config.ts"
        - "tsup.config.js"
        - "tsconfig*.json"
      outputs:
        - "dist/**"
      deps:
        - "^build"   # deps' build must finish first

    - categories: [spa]
      command: pnpm build
      inputs:
        - "src/**"
        - "public/**"
        - "rspack.config.*"
        - "vite.config.*"
        - "tailwind.config.*"
        - "postcss.config.*"
        - "index.html"
        - "package.json"
      outputs:
        - "dist/**"
      deps:
        - "^build"

    - categories: [go-binary]
      command: make build
      inputs:
        - "**/*.go"
        - "go.mod"
        - "go.sum"
        - "Makefile"
        - "internal/manifest/manifest.json"
      outputs:
        - "kb-devkit"
        - "kb-dev"
        - "kb-create"
        - "kb-deploy"
        - "kb-monitor"

    - categories: [site]
      command: pnpm build
      inputs:
        - "app/**"
        - "components/**"
        - "messages/**"
        - "public/**"
        - "next.config.*"
        - "tailwind.config.*"
        - "package.json"
      outputs:
        - ".next/**"
      deps:
        - "^build"   # wait for ts-lib deps (e.g. @kb-labs/sdk)

    - categories: [site-pkg]
      command: tsc --noEmit
      inputs:
        - "src/**"
        - "tsconfig*.json"
      outputs: []
      deps:
        - "^build"

  lint:
    - categories: [ts-lib, ts-app]
      command: eslint src/
      inputs:
        - "src/**"
        - "eslint.config.*"
        - ".eslintrc*"
      outputs: []

    - categories: [go-binary]
      command: go vet ./...
      inputs:
        - "**/*.go"
        - "go.mod"
      outputs: []

    - categories: [site]
      command: pnpm lint
      inputs:
        - "app/**"
        - "components/**"
        - "eslint.config.*"
        - "package.json"
      outputs: []

    - categories: [site-pkg]
      command: eslint --no-error-on-unmatched-pattern src/
      inputs:
        - "src/**"
        - "eslint.config.*"
      outputs: []

  type-check:
    - categories: [ts-lib, ts-app]
      command: tsc --noEmit
      inputs:
        - "src/**"
        - "tsconfig*.json"
      outputs: []
      deps:
        - "^build"   # needs deps' dist/**/*.d.ts

    - categories: [site]
      command: pnpm typecheck
      inputs:
        - "app/**"
        - "components/**"
        - "tsconfig*.json"
        - "package.json"
      outputs: []
      deps:
        - "^build"

    - categories: [site-pkg]
      command: tsc --noEmit
      inputs:
        - "src/**"
        - "tsconfig*.json"
      outputs: []
      deps:
        - "^build"

  # Playwright e2e suites.
  # Each domain package declares devDependencies on the services it tests.
  # This means `kb-devkit run e2e --affected` only runs suites whose
  # upstream packages changed — e.g. changing workflow-engine triggers
  # only @kb-labs/e2e-workflows, not gateway or marketplace.
  #
  # Local run (services already up via kb-dev start):
  #   kb-devkit run e2e --packages @kb-labs/e2e-workflows
  # Full run:
  #   kb-devkit run e2e
  # Affected only:
  #   kb-devkit run e2e --affected
  e2e:
    - categories: [e2e-suite]
      command: playwright test
      inputs:
        - "specs/**"
        - "playwright.config.ts"
        - "tsconfig.json"
      outputs: []
      deps:
        - "^build"

  test:
    - categories: [ts-lib, ts-app]
      command: vitest run --passWithNoTests
      inputs:
        - "src/**"
        - "test/**"
        - "__tests__/**"
        - "vitest.config.*"
      outputs:
        - "coverage/**"
      deps:
        - "build"

    - categories: [go-binary]
      command: make test
      inputs:
        - "**/*.go"
        - "go.mod"
        - "go.sum"
        - "Makefile"
        - "internal/manifest/manifest.json"
      outputs: []

  test:coverage:
    - categories: [ts-lib, ts-app]
      command: npx vitest run --passWithNoTests --coverage
      inputs:
        - "src/**"
        - "test/**"
        - "__tests__/**"
        - "vitest.config.*"
      outputs:
        - "coverage/**"
      deps:
        - "build"

    - categories: [go-binary]
      command: go test -coverprofile=coverage.out -covermode=atomic ./...
      inputs:
        - "**/*.go"
        - "go.mod"
      outputs:
        - "coverage.out"

  # e2e runs network-bound integration tests (real pnpm installs, downloads,
  # service boot). Only kb-create actually has an e2e suite today; other Go
  # tools implement `make e2e` as a no-op so the task is uniform across
  # go-binary packages and affected-build machinery keeps working.
  e2e:
    - categories: [go-binary]
      command: make e2e
      inputs:
        - "**/*.go"
        - "go.mod"
        - "go.sum"
        - "Makefile"
        - "internal/manifest/manifest.json"
      outputs: []
