services:
  kb-redis:
    image: redis:7-alpine
    container_name: kb-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - kb-backend

  kb-gateway:
    image: ghcr.io/kirillbaranov/kb-gateway:${IMAGE_TAG:-latest}
    container_name: kb-gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GATEWAY_JWT_SECRET=${GATEWAY_JWT_SECRET}
    volumes:
      - gateway_data:/app/.kb/database
    depends_on:
      - kb-redis
    restart: unless-stopped
    networks:
      - kb-backend

networks:
  kb-backend:
    name: kb-backend

volumes:
  redis_data:
  gateway_data:
