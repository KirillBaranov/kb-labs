registry: ghcr.io/kirillbaranov

infrastructure:
  qdrant:
    type: docker-image
    image: qdrant/qdrant:latest
    ssh:
      host: ${SSH_HOST}
      user: ${SSH_USER}
      key_env: SSH_KEY
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped
    strategy: manual

  redis:
    type: docker-image
    image: redis:7-alpine
    ssh:
      host: ${SSH_HOST}
      user: ${SSH_USER}
      key_env: SSH_KEY
    volumes:
      - redis_data:/data
    restart: unless-stopped
    strategy: manual

targets:
  kb-labs-web:
    watch:
      - sites/kb-labs-web/**
    image: kb-labs-web
    dockerfile: sites/kb-labs-web/apps/web/Dockerfile
    context: sites/kb-labs-web
    ssh:
      host: ${SSH_HOST}
      user: ${SSH_USER}
      key_env: SSH_KEY
    remote:
      compose_file: ~/kb-labs/docker-compose.yml
      service: web
      container_name: kb-labs-web
    permissions:
      logs: true
      health: true
      exec: false
      rollback: true

  kb-labs-docs:
    watch:
      - sites/kb-labs-web/apps/docs/**
    image: kb-labs-docs
    dockerfile: sites/kb-labs-web/apps/docs/Dockerfile
    context: sites/kb-labs-web
    ssh:
      host: ${SSH_HOST}
      user: ${SSH_USER}
      key_env: SSH_KEY
    remote:
      compose_file: ~/kb-labs/docker-compose.yml
      service: docs
      container_name: kb-labs-docs
    permissions:
      logs: true
      health: true
      exec: false
      rollback: true
