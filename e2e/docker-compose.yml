# KB Labs E2E — Docker Compose
#
# Provides infrastructure for e2e tests: local npm registry + KB Labs platform.
# Tests are run on the CI runner directly via `kb-devkit run e2e` (not in Docker),
# connecting to platform services through exposed host ports.
#
# Service startup order:
#   1. verdaccio  — local npm registry (always up)
#   2. publisher  — one-shot: publishes @kb-labs/*.tgz to Verdaccio, exits 0
#   3. platform   — installs KB Labs from Verdaccio, starts all services
#
# Usage:
#   # Phase 1: start registry + publish packages
#   docker-compose -f e2e/docker-compose.yml up -d verdaccio
#   docker-compose -f e2e/docker-compose.yml run --rm publisher
#
#   # Phase 2: start platform (tests run on host via kb-devkit)
#   docker-compose -f e2e/docker-compose.yml up -d --no-build platform
#
#   # Phase 3: run tests on host
#   kb-devkit run e2e                            # all domains
#   kb-devkit run e2e --packages @kb-labs/e2e-workflows   # one domain
#   kb-devkit run e2e --affected                 # only changed

services:

  # ── Local npm registry ────────────────────────────────────────────────────
  verdaccio:
    image: verdaccio/verdaccio:5
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
      - verdaccio-storage:/verdaccio/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4873/-/ping"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── Publish monorepo tarballs to Verdaccio ────────────────────────────────
  publisher:
    image: kb-e2e-ci-publisher:latest
    build:
      context: ./
      dockerfile: publisher/Dockerfile
    depends_on:
      verdaccio:
        condition: service_healthy
    environment:
      VERDACCIO_URL: http://verdaccio:4873

  # ── Full KB Labs platform (installed from Verdaccio) ──────────────────────
  platform:
    image: kb-e2e-ci-platform:latest
    build:
      context: ../
      dockerfile: e2e/platform/Dockerfile
    depends_on:
      verdaccio:
        condition: service_healthy
    ports:
      - "4000:4000"   # gateway
      - "5050:5050"   # rest-api
      - "5070:5070"   # marketplace
      - "7777:7777"   # state-daemon
      - "7778:7778"   # workflow
    environment:
      NPM_CONFIG_REGISTRY: http://verdaccio:4873
      KB_TENANT_DEFAULT_TIER: enterprise
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/ready"]
      start_period: 180s
      interval: 5s
      timeout: 5s
      retries: 40

volumes:
  verdaccio-storage:
